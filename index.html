<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUTSIDER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain"></div>

    <div class="base-layer">
        <img src="images/room.jpg" alt="room">
    </div>

    <div class="ghost-container">
        <img src="images/room.jpg" class="ghost ghost1">
        <img src="images/room.jpg" class="ghost ghost2">
        <img src="images/room.jpg" class="ghost ghost3">
    </div>

    <div class="interface">
        <div class="existential">
            <p id="question">Are you actually here?</p>
            <input type="text" id="answer" placeholder="type and press enter" autocomplete="off">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
